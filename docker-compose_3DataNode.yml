services:
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: hadoop-namenode
    restart: unless-stopped
    ports:
      - "9870:9870"
      - "9000:9000"
    env_file:
      - ./config/hadoop.env
    environment:
      HDFS_CONF_dfs_replication: "3"
    volumes:
      - namenode_3dn_data:/hadoop/dfs/name
      - ./:/workspace:ro
    mem_limit: 768m
    cpus: 1.0
    networks:
      - hadoop-lab-3dn

  datanode1:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: hadoop-datanode-1
    restart: unless-stopped
    depends_on:
      - namenode
    env_file:
      - ./config/hadoop.env
    environment:
      HDFS_CONF_dfs_replication: "3"
    volumes:
      - datanode_3dn_1_data:/hadoop/dfs/data
    mem_limit: 1536m
    cpus: 1.5
    networks:
      - hadoop-lab-3dn

  datanode2:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: hadoop-datanode-2
    restart: unless-stopped
    depends_on:
      - namenode
    env_file:
      - ./config/hadoop.env
    environment:
      HDFS_CONF_dfs_replication: "3"
    volumes:
      - datanode_3dn_2_data:/hadoop/dfs/data
    mem_limit: 1536m
    cpus: 1.5
    networks:
      - hadoop-lab-3dn

  datanode3:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: hadoop-datanode-3
    restart: unless-stopped
    depends_on:
      - namenode
    env_file:
      - ./config/hadoop.env
    environment:
      HDFS_CONF_dfs_replication: "3"
    volumes:
      - datanode_3dn_3_data:/hadoop/dfs/data
    mem_limit: 1536m
    cpus: 1.5
    networks:
      - hadoop-lab-3dn

  spark-master:
    image: bitnamilegacy/spark:3.5.1
    container_name: spark-master
    restart: unless-stopped
    depends_on:
      - namenode
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
    ports:
      - "7077:7077"
      - "8080:8080"
      - "4040:4040"
    volumes:
      - ./:/workspace
    mem_limit: 1536m
    cpus: 1.5
    networks:
      - hadoop-lab-3dn

  spark-worker:
    image: bitnamilegacy/spark:3.5.1
    container_name: spark-worker
    restart: unless-stopped
    depends_on:
      - spark-master
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 1G
      SPARK_WORKER_CORES: 1
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
    ports:
      - "8081:8081"
    volumes:
      - ./:/workspace
    mem_limit: 1536m
    cpus: 1.5
    networks:
      - hadoop-lab-3dn

volumes:
  namenode_3dn_data:
  datanode_3dn_1_data:
  datanode_3dn_2_data:
  datanode_3dn_3_data:

networks:
  hadoop-lab-3dn:
    driver: bridge
